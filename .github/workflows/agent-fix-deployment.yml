name: agent-fix-deployment

on:
  deployment_status:

permissions:
  contents: read
  actions: read         # for `gh api .../actions/runs`
  pull-requests: read   # for `gh api .../commits/.../pulls` and `gh pr view`

concurrency:
  group: agent-fix-deployment-${{ github.event.deployment.sha }}
  cancel-in-progress: false

jobs:
  fix-deployment:
    if: >
      github.event.deployment_status.state == 'failure' ||
      github.event.deployment_status.state == 'error'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Resolve the failed deployment to (a) the workflow run that produced
      # the deploy (so the agent can read its failed-job logs), and (b) the
      # originating issue number (parsed out of the merged PR's "Closes #N").
      # Skip cleanly if either lookup fails — better than handing the agent
      # incomplete context.
      - name: Resolve deployment to workflow run + issue
        id: lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA='${{ github.event.deployment.sha }}'

          RUN_ID="$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&status=failure" --jq '.workflow_runs[0].id // empty')"
          if [ -z "$RUN_ID" ]; then
            echo "No failed workflow run found for $SHA; skipping."
            exit 0
          fi

          PR_NUM="$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" --jq '.[0].number // empty')"
          if [ -z "$PR_NUM" ]; then
            echo "No PR found for commit $SHA; skipping."
            exit 0
          fi

          # Allow the grep pipeline to come back empty under `set -e`; the
          # explicit -z check below is what handles the no-match case.
          ISSUE_NUM="$(gh pr view "$PR_NUM" --repo '${{ github.repository }}' --json body --jq '.body' | grep -oiE 'closes #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)"
          if [ -z "${ISSUE_NUM:-}" ]; then
            echo "PR #$PR_NUM did not reference an issue with 'Closes #N'; skipping."
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Mint installation token for developer-agent
        if: steps.lookup.outputs.proceed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Resolve Claude model from issue labels
        if: steps.lookup.outputs.proceed == 'true'
        id: model
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Look for labels matching model:<name> (e.g. model:opus, model:haiku).
          # Fail with a clear error if more than one model:* label is present to
          # avoid ambiguous model selection.
          MODEL_LABELS="$(gh issue view "${{ steps.lookup.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(startswith("model:"))]')"
          MODEL_COUNT="$(printf '%s' "$MODEL_LABELS" | jq 'length')"
          if [ "$MODEL_COUNT" -gt 1 ]; then
            echo "::error::Multiple model:* labels found on issue: $(printf '%s' "$MODEL_LABELS" | jq -r '.[]' | tr '\n' ' '). Remove all but one before the next deployment."
            exit 1
          fi
          MODEL="$(printf '%s' "$MODEL_LABELS" | jq -r 'first // empty' | sed 's/^model://')"
          if [ -z "$MODEL" ]; then
            MODEL="${{ vars.DEFAULT_CLAUDE_MODEL }}"
          fi
          # Strip CR/LF to prevent output injection before writing to GITHUB_OUTPUT.
          MODEL="$(printf '%s' "$MODEL" | tr -d '\r\n')"
          printf 'claude_model=%s\n' "$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build agent image
        if: steps.lookup.outputs.proceed == 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.lookup.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: fix-deployment
          GITHUB_RUN_ID: ${{ steps.lookup.outputs.run_id }}
          GITHUB_ISSUE_NUMBER: ${{ steps.lookup.outputs.issue_number }}
          CLAUDE_MODEL: ${{ steps.model.outputs.claude_model }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_RUN_ID \
            -e GITHUB_ISSUE_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
