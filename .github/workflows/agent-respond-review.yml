name: agent-respond-review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read   # for `gh api .../pulls/.../reviews/.../comments`

concurrency:
  group: agent-respond-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond-review:
    # Only respond to submitted reviews on PRs authored by the developer agent
    # AND written by a trusted review author. Both gates are required:
    #
    #   PR-author gate — restricts responses to agent-authored PRs so the
    #     developer agent never spends its Anthropic budget or contents-write
    #     token responding to reviews on human-authored PRs.
    #
    #   Review-author gate — the review body and inline comments are
    #     attacker-controlled text that flows into a Claude prompt with a
    #     contents-write installation token and an Anthropic API key. On a
    #     public repo any GitHub user can submit a review on any PR, so
    #     without this gate an outside user could drive prompt injection and
    #     spend-on-demand against the developer agent. Restrict to
    #     `vars.AGENT_ALLOWLIST` (Terraform-managed) plus the known reviewer
    #     bots that post reviews on agent PRs as part of the normal workflow
    #     (the reviewer agent, and Copilot under either of the login forms it
    #     uses for review submissions: `copilot-pull-request-reviewer[bot]`
    #     for top-level review events and `github-copilot[bot]` for inline
    #     comment threads).
    #
    # The pull_request_review: submitted trigger already excludes pending/draft
    # reviews, so no need to repeat that check here.
    if: >
      github.event.pull_request.user.login == 'mfrancza-developer-agent[bot]' &&
      (
        contains(fromJSON(vars.AGENT_ALLOWLIST), github.event.review.user.login) ||
        github.event.review.user.login == 'mfrancza-reviewer-agent[bot]' ||
        github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' ||
        github.event.review.user.login == 'github-copilot[bot]'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # Checkout must precede the local agent-token action: the runner resolves
      # ./.github/actions/* references from the workspace.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Skip cleanly when there is nothing to respond to.
      # Non-approval states (changes_requested, commented) always proceed — they
      # signal the reviewer wants something changed or opened a discussion.
      # For approved reviews two skip conditions apply:
      #   1. Bare approval (no body, no inline comments): skip immediately without
      #      querying unresolved threads — the common case, short-circuits the
      #      extra API call.
      #   2. Approved + zero unresolved PR review threads: skip even when the
      #      review carries body text or inline comments — those are advisory
      #      when nothing remains unresolved. Fail open on GraphQL errors so a
      #      transient failure doesn't silently suppress a real response.
      - name: Check for reviewer feedback
        id: feedback
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # Anything other than an approved review is worth responding to.
          if [ "$REVIEW_STATE" != "approved" ]; then
            echo "Review state is '$REVIEW_STATE'; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine whether body text is present.
          HAS_BODY=false
          if [ -n "$(printf '%s' "${REVIEW_BODY:-}" | tr -d '[:space:]')" ]; then
            HAS_BODY=true
          fi

          # Determine inline review comment count.
          # Fail open: if the API call errors or returns a non-numeric value
          # (transient GitHub error, rate limit, permission regression), treat
          # the count as unknown and fall through to the unresolved-thread check.
          COMMENT_COUNT=""
          if ! COMMENT_COUNT="$(gh api "repos/$REPO_OWNER/$REPO_NAME/pulls/$PR_NUMBER/reviews/$REVIEW_ID/comments" --jq 'length' 2>/dev/null)"; then
            echo "Failed to fetch inline comments; treating inline count as unknown."
          elif ! [[ "$COMMENT_COUNT" =~ ^[0-9]+$ ]]; then
            echo "Inline comment count '$COMMENT_COUNT' is non-numeric; treating as unknown."
            COMMENT_COUNT=""
          fi

          HAS_INLINE=false
          if [[ "$COMMENT_COUNT" =~ ^[0-9]+$ ]] && [ "$COMMENT_COUNT" -gt 0 ]; then
            HAS_INLINE=true
          fi

          # Bare approval: no body text and confirmed zero inline comments.
          # Short-circuit without making the GraphQL call.
          if [ "$HAS_BODY" = false ] && [ "$HAS_INLINE" = false ] && [ -n "$COMMENT_COUNT" ]; then
            echo "Approval with no body and no inline comments; skipping respond-review."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Non-bare approval (body or inline comments present, or inline count
          # unknown): skip if the PR has zero unresolved review threads. An
          # approval with no open threads carries no actionable feedback — inline
          # comments and body text are advisory when nothing remains unresolved.
          # Fail open on GraphQL errors (empty or non-numeric response ⇒ proceed).
          # Paginates through all review threads in batches of 100 using
          # --paginate, which automatically supplies $endCursor each round.
          UNRESOLVED_COUNT="$(gh api graphql --paginate \
            -F owner="$REPO_OWNER" \
            -F name="$REPO_NAME" \
            -F number="$PR_NUMBER" \
            -f query='
              query($owner: String!, $name: String!, $number: Int!, $endCursor: String) {
                repository(owner: $owner, name: $name) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100, after: $endCursor) {
                      nodes { isResolved }
                      pageInfo { hasNextPage endCursor }
                    }
                  }
                }
              }' \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length' \
            2>/dev/null | jq -s 'add // 0')" || UNRESOLVED_COUNT=""

          if ! [[ "$UNRESOLVED_COUNT" =~ ^[0-9]+$ ]]; then
            echo "Unresolved thread count is non-numeric or unavailable; failing open and proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UNRESOLVED_COUNT" -eq 0 ]; then
            echo "Approval with zero unresolved threads; skipping respond-review."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Unresolved threads remain — there is actionable feedback to respond to.
          if [ "$HAS_BODY" = true ]; then
            echo "Approval carries a non-empty review body; $UNRESOLVED_COUNT unresolved thread(s) remain; proceeding."
          elif [ "$HAS_INLINE" = true ]; then
            echo "Approval carries $COMMENT_COUNT inline comment(s); $UNRESOLVED_COUNT unresolved thread(s) remain; proceeding."
          else
            echo "Approval with unknown inline count; $UNRESOLVED_COUNT unresolved thread(s) remain; proceeding."
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      # Mint only after we've decided to proceed — no installation token for runs we skip.
      - name: Mint installation token for developer-agent
        if: steps.feedback.outputs.proceed == 'true'
        id: setup
        uses: ./.github/actions/agent-token
        with:
          client-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        if: steps.feedback.outputs.proceed == 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.feedback.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: respond-review
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_MODEL: ${{ vars.DEFAULT_CLAUDE_MODEL }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_PR_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
