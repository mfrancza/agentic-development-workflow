name: agent-respond-review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

concurrency:
  group: agent-respond-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond-review:
    # Only respond to submitted reviews on PRs authored by the developer agent.
    # The pull_request_review: submitted trigger already excludes pending/draft
    # reviews, so no need to repeat that check here.
    if: github.event.pull_request.user.login == 'mfrancza-developer-agent[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Mint installation token for developer-agent
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: respond-review
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_MODEL: ${{ vars.DEFAULT_CLAUDE_MODEL }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_PR_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
