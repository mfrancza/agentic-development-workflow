name: agent-respond-review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read   # for `gh api .../pulls/.../reviews/.../comments`

concurrency:
  group: agent-respond-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond-review:
    # Only respond to submitted reviews on PRs authored by the developer agent.
    # The pull_request_review: submitted trigger already excludes pending/draft
    # reviews, so no need to repeat that check here.
    if: github.event.pull_request.user.login == 'mfrancza-developer-agent[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # Checkout must precede the local agent-token action: the runner resolves
      # ./.github/actions/* references from the workspace.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Skip cleanly when there is nothing to respond to: an "approved" review
      # with no body text and no inline review comments. Non-approval states
      # (changes_requested, commented) always warrant a response even if the
      # body is empty, since they signal the reviewer wants something changed
      # or opened a discussion. Approvals with any body text or inline comments
      # still warrant a response — the reviewer left feedback despite approving.
      - name: Check for reviewer feedback
        id: feedback
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_ID: ${{ github.event.review.id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Anything other than a bare approval is worth responding to.
          if [ "$REVIEW_STATE" != "approved" ]; then
            echo "Review state is '$REVIEW_STATE'; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A non-blank body counts as feedback even on an approval.
          if [ -n "$(printf '%s' "${REVIEW_BODY:-}" | tr -d '[:space:]')" ]; then
            echo "Approval carries a non-empty review body; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Inline review comments also count as feedback.
          COMMENT_COUNT="$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews/$REVIEW_ID/comments" --jq 'length')"
          if [ "$COMMENT_COUNT" -gt 0 ]; then
            echo "Approval carries $COMMENT_COUNT inline comment(s); proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Approval with no body and no inline comments; skipping respond-review."
          echo "proceed=false" >> "$GITHUB_OUTPUT"

      # Mint only after we've decided to proceed — no installation token for runs we skip.
      - name: Mint installation token for developer-agent
        if: steps.feedback.outputs.proceed == 'true'
        id: setup
        uses: ./.github/actions/agent-token
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        if: steps.feedback.outputs.proceed == 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.feedback.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: respond-review
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_MODEL: ${{ vars.DEFAULT_CLAUDE_MODEL }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_PR_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
