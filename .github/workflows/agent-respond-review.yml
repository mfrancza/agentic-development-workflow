name: agent-respond-review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read  # respond-review action posts inline reply comments via `gh api`

concurrency:
  group: agent-respond-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  respond-review:
    # Fire on reviews on any PR — author-scoping will be reintroduced later
    # via a separate rules/config layer. Skip "pending" reviews (drafts the
    # reviewer hasn't submitted yet).
    if: github.event.review.state != 'pending'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Mint installation token for developer-agent
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: respond-review
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_PR_NUMBER \
            agent-developer:ci
