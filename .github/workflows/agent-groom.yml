name: agent-groom

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: agent-groom-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  groom:
    # Gate on the agent:groom label name and sender allowlist. Triggering on
    # label application (rather than issue open) mirrors agent-implement.yml
    # and lets users control which issues get groomed. The allowlist is managed
    # as a Terraform parameter (vars.AGENT_ALLOWLIST) so usernames are not
    # hardcoded in YAML — run `terraform apply` to update it.
    if: >
      github.event.label.name == 'agent:groom' &&
      github.event.issue.state == 'open' &&
      contains(fromJSON(vars.AGENT_ALLOWLIST), github.event.sender.login)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      # Checkout must precede the local agent-token action: the runner resolves
      # ./.github/actions/* references from the workspace.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Mint installation token for developer-agent
        id: setup
        uses: ./.github/actions/agent-token
        with:
          client-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Resolve Claude model from issue labels
        id: model
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
        run: |
          set -euo pipefail
          # Look for labels matching model:<name> (e.g. model:opus, model:haiku).
          # Fail with a clear error if more than one model:* label is present to
          # avoid ambiguous model selection.
          MODEL_LABELS="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(startswith("model:"))]')"
          MODEL_COUNT="$(printf '%s' "$MODEL_LABELS" | jq 'length')"
          if [ "$MODEL_COUNT" -gt 1 ]; then
            echo "::error::Multiple model:* labels found on issue: $(printf '%s' "$MODEL_LABELS" | jq -r '.[]' | tr '\n' ' '). Remove all but one before re-applying the agent:groom label."
            exit 1
          fi
          MODEL="$(printf '%s' "$MODEL_LABELS" | jq -r 'first // empty' | sed 's/^model://')"
          if [ -z "$MODEL" ]; then
            MODEL="${{ vars.DEFAULT_CLAUDE_MODEL }}"
          fi
          # Strip CR/LF to prevent output injection before writing to GITHUB_OUTPUT.
          MODEL="$(printf '%s' "$MODEL" | tr -d '\r\n')"
          printf 'claude_model=%s\n' "$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build agent image
        run: docker build -t agent-developer:ci ./docker

      - name: Run grooming agent
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: groom
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
          CLAUDE_MODEL: ${{ steps.model.outputs.claude_model }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_ISSUE_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
