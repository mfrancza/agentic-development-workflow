name: agent-groom

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: agent-groom-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  groom:
    # Gate on the sender allowlist to prevent arbitrary users from triggering
    # paid Anthropic API calls and Actions minutes. Mirrors the same gate used
    # in agent-implement.yml.
    if: >
      github.event.issue.state == 'open' &&
      contains(fromJSON('["mfrancza"]'), github.event.sender.login)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Mint installation token for developer-agent
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        run: docker build -t agent-developer:ci ./docker

      - name: Run grooming agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: groom
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_ISSUE_NUMBER \
            agent-developer:ci
