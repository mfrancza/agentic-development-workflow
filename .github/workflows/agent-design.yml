name: agent-design

# This workflow currently contains only the un-draft job (trigger 2 of 2).
# The label-dispatch job (trigger 1: issues.labeled on agent:design) will be
# added by the agent-design action implementation task (#71).

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  undraft-sub-issues:
    # Fires only when a design-branch PR is merged — not just closed without
    # merging.  pull_request.branches filters the *base* branch, so the
    # head-branch check must live in the `if` condition instead.
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'design/issue-') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # Checkout must precede the local agent-token action: the runner resolves
      # ./.github/actions/* references from the workspace.
      # Pin checkout to the pre-merge base SHA so the local composite action
      # (./.github/actions/agent-token) is always resolved from trusted code
      # that was on main *before* this PR landed.  Without this pin, a PR that
      # modifies .github/actions/agent-token could exfiltrate
      # DEVELOPER_APP_PRIVATE_KEY at merge time.  The run: step below uses only
      # env-var inputs (HEAD_REF, GITHUB_REPO) so checking out the base is safe.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Mint installation token for developer-agent
        id: setup
        uses: ./.github/actions/agent-token
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Remove draft label from sub-issues on design-PR merge
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          GITHUB_REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          # Extract parent issue number from branch name design/issue-{N}.
          # Strict validation: the branch must match exactly design/issue-<digits>.
          # Variants like design/issue-72/foo or design/issue-72-extra pass the
          # startsWith() guard in the job `if` but would produce a non-numeric
          # PARENT_ISSUE and an invalid API path — fail loudly instead.
          if [[ ! "${HEAD_REF}" =~ ^design/issue-([0-9]+)$ ]]; then
            echo "::error::HEAD_REF '${HEAD_REF}' does not match the expected pattern 'design/issue-<N>'. Aborting to avoid an invalid API call."
            exit 1
          fi
          PARENT_ISSUE="${BASH_REMATCH[1]}"
          echo "Design PR merged for branch ${HEAD_REF}; removing draft label from sub-issues of issue #${PARENT_ISSUE}."

          # Enumerate sub-issues via the GitHub sub-issues API.
          # Capture output to a temp file so a non-zero exit from `gh api` is
          # not silently swallowed by the process substitution — `set -e` is
          # unreliable inside <(...) and would treat API failures as "no
          # sub-issues" and exit 0.
          _sub_issues_tmp="$(mktemp)"
          if ! gh api "repos/${GITHUB_REPO}/issues/${PARENT_ISSUE}/sub_issues" \
               --paginate --jq '.[].number' > "${_sub_issues_tmp}"; then
            echo "::error::Failed to list sub-issues for issue #${PARENT_ISSUE}. Check token permissions and API rate limits."
            rm -f "${_sub_issues_tmp}"
            exit 1
          fi
          mapfile -t SUB_ISSUE_NUMBERS < "${_sub_issues_tmp}"
          rm -f "${_sub_issues_tmp}"

          echo "Found ${#SUB_ISSUE_NUMBERS[@]} sub-issue(s)."

          if [ "${#SUB_ISSUE_NUMBERS[@]}" -eq 0 ]; then
            echo "No sub-issues found for issue #${PARENT_ISSUE}; nothing to un-draft."
            exit 0
          fi

          for ISSUE_NUM in "${SUB_ISSUE_NUMBERS[@]}"; do
            echo "Removing draft label from issue #${ISSUE_NUM}."
            if ! gh issue edit "$ISSUE_NUM" --repo "${GITHUB_REPO}" --remove-label "draft"; then
              # Distinguish benign from operational failure: if the label is still
              # present after the failed removal, it's an operational error
              # (permissions, rate-limit, transient API error) and we must fail
              # loudly — leaving the issue labeled `draft` silently blocks the
              # developer agent.  If the label is already absent the edit command
              # may have exited non-zero simply because the label wasn't there,
              # which is a no-op that we treat as a warning and continue.
              if gh api "repos/${GITHUB_REPO}/issues/${ISSUE_NUM}" --jq 'any(.labels[]; .name == "draft")' \
                   2>/dev/null | grep -qx "true"; then
                echo "::error::Failed to remove draft label from issue #${ISSUE_NUM} and the label is still present. Check token permissions and API rate limits."
                exit 1
              else
                echo "::warning::Could not remove draft label from issue #${ISSUE_NUM} — the label was already absent (non-fatal)."
              fi
            fi
          done

          echo "Done un-drafting ${#SUB_ISSUE_NUMBERS[@]} sub-issue(s)."
