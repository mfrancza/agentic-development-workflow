name: secret-scan

# Full-history secret scan. Runs on every push and PR against main, on a
# weekly schedule, and on manual dispatch. See issue #174 for the pre-public
# audit that motivated this workflow. Known false positives (documentation
# placeholders in historical commits) are allowlisted by fingerprint in
# `.gitleaksignore` at the repo root.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  schedule:
    # Weekly defense-in-depth scan. Even if no commits happen, gitleaks rule
    # updates released after the workflow was last run can catch previously
    # unrecognized patterns.
    - cron: '0 6 * * 1'  # Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs of the same event type on the same branch.
  # Including event_name in the key prevents a push to main from cancelling an
  # in-progress scheduled or manual run (and vice versa).
  group: secret-scan-${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # fetch-depth: 0 gives gitleaks the full commit graph so `--log-opts
      # "--all"` can walk every branch and tag ref reachable in the checkout.
      # Per actions/checkout docs, fetch-depth: 0 already fetches all history
      # for all branches and tags; fetch-tags is only needed for shallow clones.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Install gitleaks by downloading the pinned release tarball and
      # verifying its SHA-256 checksum. Pinning to a specific version (and
      # checksum) means a compromised or retagged release can't silently ship
      # into CI. Bump GITLEAKS_VERSION and GITLEAKS_SHA256 together when
      # updating.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.28.0
          GITLEAKS_SHA256: a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl --fail --silent --show-error --location --retry 3 --output "$tarball" "$url"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum --check --status
          tar -xzf "$tarball" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f "$tarball" gitleaks
          gitleaks version

      # Full-history scan across every ref reachable in the checkout. Known
      # false positives are silenced by fingerprint in `.gitleaksignore`. Any
      # finding not in that file fails the job (default `--exit-code 1`).
      # `--redact` keeps secret values out of workflow logs even on failure.
      - name: Run gitleaks (full history)
        run: |
          set -euo pipefail
          gitleaks git \
            --log-opts="--all" \
            --gitleaks-ignore-path=.gitleaksignore \
            --redact \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --verbose

      # Upload the report even on success so the audit trail is preserved.
      # `if: always()` also captures the report when the previous step fails,
      # which is when the artifact is most useful.
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 30
