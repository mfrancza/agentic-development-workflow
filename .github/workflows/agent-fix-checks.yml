name: agent-fix-checks

on:
  workflow_run:
    # `workflows:` is required by the GitHub Actions schema — without it the
    # file fails validation with "on.workflow_run does not reference any
    # workflows". No real CI workflow exists in this repo yet; "CI" is a
    # placeholder. Update this list (or add the CI workflow with this name)
    # when CI lands so fix-checks actually fires on its failures.
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read  # for `gh pr view` in the trust-gate step

concurrency:
  # Fall back to workflow_run.id when the run isn't tied to a PR — otherwise
  # unrelated PR-less workflow runs all collide on `agent-fix-checks-pr-`.
  group: agent-fix-checks-pr-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  fix-checks:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      # The workflow_run event payload doesn't include the PR author, so look it
      # up and only proceed if the PR was authored by the developer agent.
      # This is the trust gate: we only react to checks failing on the
      # agent's own PRs, never on PRs from other authors.
      - name: Filter to agent-authored PRs
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUM='${{ github.event.workflow_run.pull_requests[0].number }}'
          AUTHOR="$(gh pr view "$PR_NUM" --repo '${{ github.repository }}' --json author --jq '.author.login')"
          if [ "$AUTHOR" = "app/mfrancza-developer-agent" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "PR #$PR_NUM author '$AUTHOR' is not the developer agent; skipping"
          fi

      - name: Mint installation token for developer-agent
        if: steps.filter.outputs.proceed == 'true'
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        if: steps.filter.outputs.proceed == 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.filter.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: fix-checks
          GITHUB_PR_NUMBER: ${{ steps.filter.outputs.pr_number }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_PR_NUMBER \
            agent-developer:ci
