name: agent-review

on:
  # pull_request_target (not pull_request) is intentional: GitHub always
  # resolves the workflow YAML and the build context for docker/reviewer from
  # the *base* branch, never from the PR head. This prevents an allowlisted
  # user applying agent:review from triggering a run that executes PR-authored
  # workflow code or a PR-authored Docker image with access to
  # REVIEWER_APP_PRIVATE_KEY and ANTHROPIC_API_KEY.
  pull_request_target:
    types: [labeled, synchronize]

permissions:
  contents: read

concurrency:
  group: agent-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    # Gate differently per event type:
    #
    # Trust model — fork-headed PRs are excluded entirely on both event paths.
    #   Even though checkout is pinned to the base SHA (trusted code runs), the
    #   attacker-controlled diff still reaches Claude on every push, so the
    #   secrets exposure window is real. Both event types require
    #   github.event.pull_request.head.repo.full_name == github.repository to
    #   enforce this. Fork contributors may still
    #   request a review by asking a repo member to cherry-pick / create a
    #   same-repo branch from the fork's changes, open a new PR from that
    #   branch in the base repo, and then apply the agent:review label to that
    #   same-repo PR.
    #
    # labeled — keep the existing sender-allowlist check: the user who applied
    #   the label must be in vars.AGENT_ALLOWLIST. GitHub has no per-label
    #   permission model and `repository_owner` doesn't work in org repos (it's
    #   the org login, not a user). The allowlist is managed as a Terraform
    #   parameter so usernames are not hardcoded in YAML.
    #
    # synchronize — check only that agent:review is already on the PR and that
    #   the head repo matches the base repo (same-repo push); no sender check.
    #   The sender on synchronize is the pusher, not the actor who applied the
    #   label. The label is the authorization artifact: it was applied earlier
    #   by an allowlisted actor, so its presence is sufficient to authorize
    #   re-review for same-repo pushes. Fork-headed PRs are rejected here to
    #   prevent an attacker-controlled push from triggering the reviewer with
    #   secrets in scope on every push. See docs/design/re-review-loop.md § 1.
    if: >
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'labeled' &&
         github.event.label.name == 'agent:review' &&
         contains(fromJSON(vars.AGENT_ALLOWLIST), github.event.sender.login)) ||
        (github.event.action == 'synchronize' &&
         contains(github.event.pull_request.labels.*.name, 'agent:review'))
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # Checkout must precede the local agent-token action: the runner resolves
      # ./.github/actions/* references from the workspace.
      # Pin to the base branch SHA explicitly so the agent-token action and the
      # docker/reviewer build context are always loaded from trusted base-branch
      # code, not from the PR head. This matters even with pull_request_target
      # (which already runs the workflow YAML from the base) because it makes
      # the intent unambiguous and guards against accidental ref drift.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Mint installation token for reviewer-agent
        id: setup
        uses: ./.github/actions/agent-token
        with:
          client-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Resolve Claude model from PR labels
        id: model
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          # Pass event-derived and repo-variable values via env so they are
          # parsed by the shell rather than interpolated into the run: script
          # by the Actions expression engine. This satisfies the
          # output-injection hardening rule in AGENTS.md: untrusted content
          # must never be interpolated directly into run: via ${{ ... }}.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DEFAULT_MODEL: ${{ vars.DEFAULT_MODEL }}
        run: |
          set -euo pipefail
          # Look for labels matching model:<name> (e.g. model:opus, model:haiku).
          # Fail with a clear error if more than one model:* label is present to
          # avoid ambiguous model selection.
          MODEL_LABELS="$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json labels \
            --jq '[.labels[].name | select(startswith("model:"))]')"
          MODEL_COUNT="$(printf '%s' "$MODEL_LABELS" | jq 'length')"
          if [ "$MODEL_COUNT" -gt 1 ]; then
            echo "::error::Multiple model:* labels found on PR: $(printf '%s' "$MODEL_LABELS" | jq -r '.[]' | tr '\n' ' '). Remove all but one before re-applying the agent:review label."
            exit 1
          fi
          MODEL="$(printf '%s' "$MODEL_LABELS" | jq -r 'first // empty' | sed 's/^model://')"
          if [ -z "$MODEL" ]; then
            MODEL="$DEFAULT_MODEL"
          fi
          # Strip CR/LF to prevent output injection before writing to GITHUB_OUTPUT.
          MODEL="$(printf '%s' "$MODEL" | tr -d '\r\n')"
          printf 'agent_model=%s\n' "$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build reviewer image
        run: docker build -t agent-reviewer:ci ./docker/reviewer

      - name: Run reviewer agent
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          AGENT_MODEL: ${{ steps.model.outputs.agent_model }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e OPENAI_API_KEY \
            -e GITHUB_REPO \
            -e GITHUB_PR_NUMBER \
            -e AGENT_MODEL \
            agent-reviewer:ci
