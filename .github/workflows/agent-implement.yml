name: agent-implement

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: agent-implement-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    # Gate on the user who applied the label, not who opened the issue. The
    # allowlist is managed as a Terraform parameter (vars.AGENT_ALLOWLIST) so
    # usernames are not hardcoded in YAML — run `terraform apply` to update it.
    # GitHub has no per-label permission model and `repository_owner` doesn't
    # work in org repos (it's the org login, not a user).
    if: >
      github.event.label.name == 'agent:developer' &&
      github.event.issue.state == 'open' &&
      contains(fromJSON(vars.AGENT_ALLOWLIST), github.event.sender.login)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false

      - name: Mint installation token for developer-agent
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: "Preflight: skip if PR already exists"
        id: preflight
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          OWNER="${{ github.repository_owner }}"
          # gh pr list --head treats "owner:branch" as a literal branch name and
          # never matches.  Query by branch name only and filter by owner via jq
          # to exclude PRs from forks with the same branch name.
          PR_NUMBER="$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open \
            --json number,headRepositoryOwner \
            --jq "[.[] | select(.headRepositoryOwner.login == \"$OWNER\")][0].number // empty" \
            2>/dev/null || true)"
          if [ -n "$PR_NUMBER" ]; then
            echo "Found existing open PR #$PR_NUMBER for $BRANCH (owner: $OWNER); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build agent image
        if: steps.preflight.outputs.skip != 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.preflight.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: implement
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_ISSUE_NUMBER \
            agent-developer:ci
