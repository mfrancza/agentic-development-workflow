name: agent-implement

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: agent-implement-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    # Gate on the user who applied the label, not who opened the issue. The
    # allowlist is managed as a Terraform parameter (vars.AGENT_ALLOWLIST) so
    # usernames are not hardcoded in YAML — run `terraform apply` to update it.
    # GitHub has no per-label permission model and `repository_owner` doesn't
    # work in org repos (it's the org login, not a user).
    if: >
      github.event.label.name == 'agent:developer' &&
      github.event.issue.state == 'open' &&
      contains(fromJSON(vars.AGENT_ALLOWLIST), github.event.sender.login)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Setup agent
        id: setup
        uses: ./.github/actions/agent-setup
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: "Preflight: skip if PR already exists"
        id: preflight
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          OWNER="${{ github.repository_owner }}"
          # gh pr list --head treats "owner:branch" as a literal branch name and
          # never matches.  Query by branch name only and filter by owner via jq
          # to exclude PRs from forks with the same branch name.
          PR_NUMBER="$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --state open \
            --json number,headRepositoryOwner \
            --jq "[.[] | select(.headRepositoryOwner.login == \"$OWNER\")][0].number // empty" \
            2>/dev/null || true)"
          if [ -n "$PR_NUMBER" ]; then
            echo "Found existing open PR #$PR_NUMBER for $BRANCH (owner: $OWNER); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Claude model from issue labels
        if: steps.preflight.outputs.skip != 'true'
        id: model
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
        run: |
          set -euo pipefail
          # Look for labels matching model:<name> (e.g. model:opus, model:haiku).
          # Fail with a clear error if more than one model:* label is present to
          # avoid ambiguous model selection.
          MODEL_LABELS="$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(startswith("model:"))]')"
          MODEL_COUNT="$(printf '%s' "$MODEL_LABELS" | jq 'length')"
          if [ "$MODEL_COUNT" -gt 1 ]; then
            echo "::error::Multiple model:* labels found on issue: $(printf '%s' "$MODEL_LABELS" | jq -r '.[]' | tr '\n' ' '). Remove all but one before re-applying the agent:developer label."
            exit 1
          fi
          MODEL="$(printf '%s' "$MODEL_LABELS" | jq -r 'first // empty' | sed 's/^model://')"
          if [ -z "$MODEL" ]; then
            MODEL="${{ vars.DEFAULT_CLAUDE_MODEL }}"
          fi
          # Strip CR/LF to prevent output injection before writing to GITHUB_OUTPUT.
          MODEL="$(printf '%s' "$MODEL" | tr -d '\r\n')"
          printf 'claude_model=%s\n' "$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build agent image
        if: steps.preflight.outputs.skip != 'true'
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        if: steps.preflight.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: implement
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
          CLAUDE_MODEL: ${{ steps.model.outputs.claude_model }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_ISSUE_NUMBER \
            -e CLAUDE_MODEL \
            agent-developer:ci
