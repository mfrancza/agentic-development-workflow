name: agent-implement

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  implement:
    if: github.event.label.name == 'agent:developer' && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Mint installation token for developer-agent
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEVELOPER_APP_ID }}
          private-key: ${{ secrets.DEVELOPER_APP_PRIVATE_KEY }}

      - name: Build agent image
        run: docker build -t agent-developer:ci ./docker

      - name: Run agent
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          AGENT_ACTION: implement
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_REPO \
            -e AGENT_ACTION \
            -e GITHUB_ISSUE_NUMBER \
            agent-developer:ci
